<select [ngModel]="choice" (ngModelChange)="onChoice($event)" aria-label="Week definition">
  <option value="">No defined week (free text)</option>
  @for (p of presets; track p) {
    <option [value]="p.key">{{ p.label }}</option>
  }
  <option value="custom">Custom…</option>
</select>

@if (choice === 'custom') {
  <div style="margin-top: 8px;">
    <!-- One box per day, in week order; the "+" under the last box spawns the next. -->
    <div style="display: grid; gap: 6px;">
      @for (day of customDays; track $index; let i = $index) {
        <input
          [ngModel]="customDays[i]" (ngModelChange)="onDayInput(i, $event)"
          autocomplete="off" maxlength="40"
          [placeholder]="i === 0 ? 'First day · e.g. Sul' : 'Next day'"
          [attr.aria-label]="'Day ' + (i + 1) + ' of the week'">
      }
    </div>
    @if (canAddDay) {
      <div style="margin-top: 8px;">
        <button class="btn" (click)="addDay()"
        aria-label="Add another day" title="Add the next day of the week">+</button>
      </div>
    }
    @if (incomplete) {
      <div class="modal-sub" style="margin-top: 4px;">
        Name at least {{ minDays }} days to define the week.
      </div>
    }
  </div>
}

@if (preview?.length) {
  <div class="modal-sub" style="margin-top: 4px;">
    {{ preview!.join(' · ') }}
  </div>
}
