<router-outlet></router-outlet>

@if (pc) {
  <app-character-sheet
    [pc]="pc"
    [editable]="editable"
    [slotInventory]="slotInventory"
    [survivalConditions]="survivalConditions"
    [strictComponents]="strictComponents"
    [location]="location"
    (deleteRequested)="openDeleteModal()"
    (rollRequested)="openRollModal()"
    (levelUpRequested)="openLevelUpModal()"
    (connectRequested)="connectToSession()"
    (joinCampaignRequested)="openJoinModal()">
  </app-character-sheet>
}

@if (!pc) {
  <app-empty-state
    (forgeHero)="openCreateModal()">
  </app-empty-state>
}

<!-- Delete confirmation overlay -->
@if (isDeleteModalOpen && pc) {
  <div
    class="modal-backdrop"
    (click)="closeDeleteModal()">
    <app-delete-confirmation-modal
      [pc]="pc"
      (click)="$event.stopPropagation()"
      (confirm)="onDeleteConfirm()"
      (close)="closeDeleteModal()">
    </app-delete-confirmation-modal>
  </div>
}

<!-- Dice roller overlay -->
@if (isRollModalOpen) {
  <div
    class="modal-backdrop"
    (click)="closeRollModal()">
    <app-dice-roller-modal
      [pc]="pc"
      [sessionId]="activeRollSessionId"
      [participantId]="activeRollParticipantId"
      (click)="$event.stopPropagation()"
      (close)="closeRollModal()">
    </app-dice-roller-modal>
  </div>
}

<!-- Level-up overlay -->
@if (isLevelUpModalOpen && pc) {
  <div
    class="modal-backdrop"
    (click)="closeLevelUpModal()">
    <app-level-up-modal
      [pc]="pc"
      (click)="$event.stopPropagation()"
      (close)="closeLevelUpModal()">
    </app-level-up-modal>
  </div>
}
