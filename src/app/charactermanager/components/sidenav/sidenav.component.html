<div class="app">

  <!-- ═══════════════════════════════════════════════
       SIDEBAR
       ═══════════════════════════════════════════════ -->
  <aside class="sidebar" [class.open]="drawerOpen">

    <!-- Brand block (constant across both modes) -->
    <div class="brand">
      <div class="brand-mark">
        <!-- SigilBrand — two concentric circles + 10-point star + center dot -->
        <svg viewBox="0 0 48 48" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="24" cy="24" r="22" opacity="0.35"/>
          <circle cx="24" cy="24" r="14"/>
          <polygon points="24,6 28,20 42,22 30,30 34,44 24,36 14,44 18,30 6,22 20,20" stroke-linejoin="round"/>
          <circle cx="24" cy="24" r="3" fill="currentColor"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">TABLE MIMIC</div>
        <div class="brand-sub">a chronicle of heroes &amp; hauntings</div>
      </div>
    </div>

    <!-- ── PLAYER MODE: roster ─────────────────────────────────────────── -->
    <ng-container *ngIf="(role$ | async) === 'player'; else dmSidebar">

      <!-- Search -->
      <div class="search">
        <svg class="search-icon" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="7" cy="7" r="5"/>
          <path d="M11 11l4 4"/>
        </svg>
        <input
          [(ngModel)]="query"
          placeholder="Search heroes, players, classes…"
          autocomplete="off"
        >
      </div>

      <!-- Roster (scrollable) -->
      <div style="overflow-y: auto; flex: 1;">

        <p *ngIf="filteredPcs.length === 0"
           style="padding: 20px; color: var(--text-dim); font-style: italic; text-align: center; font-size: 13px; margin: 0;">
          No heroes match that name.
        </p>

        <div class="roster-items">
          <div
            class="roster-item"
            [class.active]="(activePC$ | async)?.id === pc.id"
            *ngFor="let pc of filteredPcs"
            (click)="setActivePC(pc)"
          >
            <!-- Portrait circle -->
            <div class="portrait" [style.background]="tintFor(pc)">
              {{ initialsFor(pc) }}
            </div>

            <!-- Name + meta -->
            <div style="min-width: 0;">
              <div class="roster-name">{{ pc.name }}</div>
              <div class="roster-meta">{{ pc.race }} {{ pc.clazz }}</div>
            </div>

            <!-- Level pill -->
            <div class="roster-level">L{{ pc.level }}</div>
          </div>
        </div>
      </div>
    </ng-container>

    <!-- ── DM MODE: campaign list ──────────────────────────────────────── -->
    <ng-template #dmSidebar>
      <div style="overflow-y: auto; flex: 1;">
        <app-campaign-sidebar></app-campaign-sidebar>
      </div>
    </ng-template>

    <!-- Footer: mode action + account row (constant) -->
    <div class="sidebar-footer">
      <button *ngIf="(role$ | async) === 'player'" class="btn primary" (click)="forgeHero()">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6"
             style="margin-right: 8px; vertical-align: -2px;">
          <path d="M8 3v10M3 8h10"/>
        </svg>
        Forge Hero
      </button>
      <button *ngIf="(role$ | async) === 'player'" class="btn" (click)="joinCampaign()">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.3"
             style="margin-right: 8px; vertical-align: -2px;">
          <path d="M6 3h12v15l-6-3.5L6 18V3z" stroke-linejoin="round" transform="scale(0.66) translate(2,1)"/>
        </svg>
        Join Campaign
      </button>
      <button *ngIf="(role$ | async) === 'dm'" class="btn primary" (click)="newCampaign()">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6"
             style="margin-right: 8px; vertical-align: -2px;">
          <path d="M8 3v10M3 8h10"/>
        </svg>
        New Campaign
      </button>

      <!-- Account row → opens settings slide-over -->
      <div class="account-row" (click)="openSettings()" title="Open your profile">
        <div class="portrait" [style.background]="userTint">{{ user.initials }}</div>
        <div style="min-width: 0;">
          <div class="account-name">{{ user.name }}</div>
          <div class="account-email">{{ user.email }}</div>
        </div>
        <!-- IconGear -->
        <svg class="account-gear" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </div>
    </div>

  </aside>

  <!-- Mobile-only scrim: tap to dismiss the drawer (no effect at desktop widths) -->
  <div class="drawer-scrim" [class.show]="drawerOpen" (click)="closeDrawer()"></div>

  <!-- ═══════════════════════════════════════════════
       MAIN CONTENT
       ═══════════════════════════════════════════════ -->
  <main class="main">

    <!-- Mobile-only top bar: hamburger + brand + active hero name (hidden at >=821px via CSS) -->
    <div class="mobile-topbar">
      <button class="mobile-menu-btn" (click)="toggleDrawer()" aria-label="Open party menu">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M3 6h18M3 12h18M3 18h18"/>
        </svg>
      </button>
      <div class="mobile-topbar-brand">
        <svg class="brand-mark" viewBox="0 0 48 48" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="24" cy="24" r="22" opacity="0.35"/>
          <circle cx="24" cy="24" r="14"/>
          <polygon points="24,6 28,20 42,22 30,30 34,44 24,36 14,44 18,30 6,22 20,20" stroke-linejoin="round"/>
          <circle cx="24" cy="24" r="3" fill="currentColor"/>
        </svg>
        <span class="mobile-topbar-title">{{ (activePC$ | async)?.name || 'Table Mimic' }}</span>
      </div>
    </div>

    <div class="main-inner">
      <!-- Session Mode overlays both Player and DM views while a session is live -->
      <ng-container *ngIf="(activeSessionId$ | async) as sessionId; else normalView">
        <app-session-mode [sessionId]="sessionId"></app-session-mode>
      </ng-container>
      <ng-template #normalView>
        <ng-container *ngIf="(role$ | async) === 'player'; else dmMain">
          <app-session-live-banner></app-session-live-banner>
          <router-outlet></router-outlet>
        </ng-container>
        <ng-template #dmMain>
          <app-campaign-dashboard></app-campaign-dashboard>
        </ng-template>
      </ng-template>
    </div>
  </main>

</div>
