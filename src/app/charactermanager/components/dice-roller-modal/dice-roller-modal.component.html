<div class="modal dice-modal" [class.is-rolling]="phase === 'rolling'">

  <button class="dice-close" type="button" title="Close" (click)="cancel()">&times;</button>

  <div class="modal-title">Cast The Bones</div>
  <div class="modal-sub">
    Drag dice into the field, then grab the cluster and flick it to throw.
  </div>

  <!-- ── Palette: pick die types from the top ─────────────────────────────── -->
  <div
    class="dice-palette"
    cdkDropList
    #palette="cdkDropList"
    [cdkDropListConnectedTo]="[arena]"
    [cdkDropListSortingDisabled]="true">
    <button
      *ngFor="let sides of dieTypes"
      type="button"
      class="palette-die"
      [attr.data-die]="'d' + sides"
      cdkDrag
      [cdkDragData]="sides"
      (click)="addDie(sides)"
      title="Add a d{{ sides }} (or drag it down into the field)">
      <span class="die-shape" [attr.data-die]="'d' + sides">
        <span class="die-label">d{{ sides }}</span>
      </span>
      <span class="die-count" *ngIf="countOf(sides) as n">{{ n }}</span>
    </button>
  </div>

  <!-- ── Arena: the rolling field (drop target) ───────────────────────────── -->
  <div
    class="dice-arena"
    #arenaEl
    cdkDropList
    #arena="cdkDropList"
    (cdkDropListDropped)="onDrop($event)">
    <span class="arena-ceiling"></span>

    <p class="arena-hint" *ngIf="staged.length === 0">
      Your dice field is empty — drag dice here.
    </p>

    <!-- Resting / flying dice live on the shelf at the bottom of the arena.
         The shelf itself is the grab target: drag to reposition (clamped to
         the arena), release with a flick to throw. Tap, Enter, or Space rolls. -->
    <div
      class="dice-shelf"
      #shelfEl
      tabindex="0"
      role="button"
      aria-label="Roll the dice"
      [class.grabbing]="dragging"
      [style.--cluster-x.px]="clusterX"
      [style.--cluster-y.px]="clusterY"
      (pointerdown)="onClusterPointerDown($event)"
      (pointermove)="onClusterPointerMove($event)"
      (pointerup)="onClusterPointerUp($event)"
      (pointercancel)="onClusterPointerCancel()"
      (keydown.enter)="throwButton()"
      (keydown.space)="throwButton()">
      <span
        *ngFor="let d of staged; trackBy: trackById"
        class="arena-die"
        [class.flying]="phase === 'rolling'"
        [class.landed]="phase === 'result'"
        [attr.data-die]="'d' + d.sides"
        [style.--dx.px]="d.dx"
        [style.--peak.px]="d.peak"
        [style.--rest.px]="d.rest"
        [style.--spin.deg]="d.spin"
        [style.--delay.ms]="d.delay"
        title="d{{ d.sides }}">
        <span class="die-shape" [attr.data-die]="'d' + d.sides">
          <span class="die-face">{{ d.display }}</span>
        </span>
      </span>
    </div>
  </div>

  <!-- ── Result readout ───────────────────────────────────────────────────── -->
  <div class="dice-result" *ngIf="phase === 'result'">
    <div class="result-total">
      <span class="result-total-num">{{ grandTotal }}</span>
      <span class="result-total-label">Total</span>
    </div>
    <div class="result-breakdown">
      <div class="breakdown-row" *ngFor="let row of breakdown">
        <span class="breakdown-label">{{ row.label }}</span>
        <span class="breakdown-rolls">{{ row.rolls.join(', ') }}</span>
        <span class="breakdown-sub">{{ row.subtotal }}</span>
      </div>
    </div>
  </div>

  <!-- ── Throw bar: Clear + the keyboard/click Roll fallback ──────────────── -->
  <div class="dice-throwbar">
    <button
      type="button"
      class="btn sm"
      [disabled]="staged.length === 0 || phase === 'rolling'"
      (click)="clear()">
      Clear
    </button>

    <button
      type="button"
      class="btn primary"
      [disabled]="!canThrow"
      (click)="throwButton()"
      (keydown.enter)="throwButton()"
      (keydown.space)="throwButton()">
      Roll
    </button>
  </div>

</div>
