<div class="panel">
  <div class="panel-header">
    <span class="panel-title">Coin Purse</span>
    <span style="font-family: 'EB Garamond', serif; font-style: italic; font-size: 13px; color: var(--text-dim);">
      ≈ {{ gpEquiv }} gp
    </span>
  </div>
  <div class="currency">
    <div *ngFor="let coin of coinTypes" class="coin {{ coin.key }}">
      <div class="coin-amt numeric">{{ coinAmt(coin.key) }}</div>
      <div class="coin-name">{{ coin.label }}</div>
    </div>
  </div>
</div>
