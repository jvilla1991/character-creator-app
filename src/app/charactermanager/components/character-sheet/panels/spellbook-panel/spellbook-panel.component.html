<div class="panel">
  <div class="panel-header">
    <span class="panel-title">Spellbook</span>
  </div>

  <!-- No spells -->
  <div
    *ngIf="!hasSpells"
    style="color: var(--text-dim); font-style: italic; text-align: center; padding: 16px;"
  >
    {{ pc.name.split(' ')[0] }} wields no magic — only steel and conviction.
  </div>

  <!-- Spell levels -->
  <ng-container *ngIf="hasSpells">
    <div *ngFor="let level of spellsByLevel; trackBy: trackByLvl" class="spell-level">

      <div class="spell-level-header">
        <span class="spell-level-name">{{ level.label }}</span>
        <div *ngIf="level.slots" class="spell-slots">
          <button
            *ngFor="let i of level.slotIndices"
            class="spell-slot"
            [class.used]="i < level.slots!.used"
            (click)="slotToggled.emit({ level: level.lvl, index: i })"
            [title]="i < level.slots!.used ? 'Restore slot' : 'Expend slot'"
          ></button>
        </div>
      </div>

      <div *ngFor="let s of level.spells" class="spell-row">
        <span class="spell-name" [class.prepared]="s.prepared">{{ s.name }}</span>
        <span class="spell-school">{{ s.school }}</span>
        <span class="spell-time">{{ s.time }}</span>
      </div>

    </div>
  </ng-container>
</div>
