<div class="fade-in">

  <!-- ═══════════════════════════════════════════════
       SHEET HEADER: portrait · identity · actions
       ═══════════════════════════════════════════════ -->
  <header class="sheet-header">

    <!-- XL portrait circle -->
    <div class="portrait xl" [style.background]="tintFor(pc)">
      {{ initialsFor(pc) }}
    </div>

    <!-- Identity column -->
    <div class="sheet-id">
      <div class="eyebrow">played by {{ pc.player || pc.playerName }}</div>

      <!-- Editable hero name -->
      <input
        *ngIf="editingName"
        class="sheet-name sheet-name-edit"
        [(ngModel)]="nameDraft"
        (blur)="commitName()"
        (keydown.enter)="commitName()"
        (keydown.escape)="cancelNameEdit()"
        autofocus
      >
      <h1
        *ngIf="!editingName"
        class="sheet-name"
        (dblclick)="startNameEdit()"
        title="Double-click to rename"
      >{{ pc.name }}</h1>

      <div class="sheet-subtitle">
        {{ pc.race }}
        <span class="dot">✦</span>
        {{ pc.clazz }} <em style="color: var(--text-dim)">({{ pc.subclass }})</em>
        <span class="dot">✦</span>
        Level
        <app-editable-number
          [value]="pc.level"
          [editable]="editable"
          [min]="1" [max]="20"
          label="level"
          (committed)="onLevelCommit($event)"
        >{{ pc.level }}</app-editable-number>
        <span class="dot">✦</span>
        <span
          class="sheet-xp"
          [title]="xpForNextLevel != null
            ? (pc.xp || 0) + ' / ' + xpForNextLevel + ' XP to next level'
            : 'Maximum level reached'"
        >{{ pc.xp || 0 }}<ng-container *ngIf="xpForNextLevel != null"> / {{ xpForNextLevel }}</ng-container> XP</span>
        <span *ngIf="readyToLevel" class="level-ready-badge" title="Enough XP to advance — use Level Up">
          Ready to level up
        </span>
      </div>

      <!-- XP progress through the current level -->
      <div
        class="xp-track"
        [class.max]="xpForNextLevel == null"
        [class.ready]="readyToLevel"
        [title]="xpForNextLevel != null
          ? (pc.xp || 0) + ' / ' + xpForNextLevel + ' XP to next level'
          : 'Maximum level reached'"
      >
        <span class="xp-fill" [style.width.%]="xpProgressPct"></span>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="sheet-actions" *ngIf="showActions">
      <!-- Connect: enabled for campaign members; disabled with a hint otherwise -->
      <div class="connect-wrap">
        <span *ngIf="!inCampaign" class="connect-hint" [class.show]="connectHintPinned">
          This character is not part of a campaign yet
        </span>
        <button
          class="btn play"
          [class.is-disabled]="!inCampaign"
          [attr.aria-disabled]="!inCampaign"
          [title]="inCampaign ? 'Connect to your campaign session' : 'This character is not part of a campaign yet'"
          (click)="onConnectClick()"
        >
          <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"
               style="margin-right: 6px; vertical-align: -2px;">
            <path d="M4 2.5v11l9-5.5z"/>
          </svg>
          Connect
        </button>
      </div>
      <button class="btn" title="Roll dice" (click)="rollRequested.emit()">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.4"
             style="margin-right: 6px; vertical-align: -2px;">
          <path d="M8 1l6 3.5v7L8 15l-6-3.5v-7L8 1z"/>
          <path d="M8 1v14M2 4.5l6 3.5 6-3.5"/>
        </svg>
        Roll
      </button>
      <button class="btn" [class.ready]="readyToLevel" title="Advance a level" (click)="levelUpRequested.emit()">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.4"
             style="margin-right: 6px; vertical-align: -2px;">
          <path d="M8 13V3M8 3L4 7M8 3l4 4M3 14h10"/>
        </svg>
        Level Up
      </button>
      <button class="btn danger icon" (click)="deleteRequested.emit()" title="Delete character">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M3 4h10M6 4V2.5A.5.5 0 016.5 2h3a.5.5 0 01.5.5V4M4.5 4l.7 9a1 1 0 001 .9h3.6a1 1 0 001-.9l.7-9"/>
        </svg>
      </button>
    </div>

  </header>

  <!-- Section tabs. Desktop: a bar under the header. Mobile: fixed to the
       bottom of the screen and follows the player as they scroll (see SCSS). -->
  <nav class="sheet-tabs" role="tablist">
    <button type="button" class="sheet-tab" role="tab" [class.active]="activeTab === 'sheet'"
            [attr.aria-selected]="activeTab === 'sheet'" (click)="setTab('sheet')">Sheet</button>
    <button type="button" class="sheet-tab" role="tab" [class.active]="activeTab === 'spells'"
            [attr.aria-selected]="activeTab === 'spells'" (click)="setTab('spells')">Spells</button>
    <button type="button" class="sheet-tab" role="tab" [class.active]="activeTab === 'inventory'"
            [attr.aria-selected]="activeTab === 'inventory'" (click)="setTab('inventory')">Inventory</button>
    <button type="button" class="sheet-tab" role="tab" [class.active]="activeTab === 'notes'"
            [attr.aria-selected]="activeTab === 'notes'" (click)="setTab('notes')">Notes</button>
  </nav>

  <!-- Vitals stay visible on every tab (HP/AC always matter). -->
  <app-vitals-strip
    [pc]="pc"
    [editable]="editable"
    (pcChange)="onPcChange($event)">
  </app-vitals-strip>

  <!-- SHEET TAB: abilities, skills, conditions, survival, features, wealth, bio -->
  <div class="sheet-grid" *ngIf="activeTab === 'sheet'">
    <div class="col-left">
      <app-ability-scores
        [pc]="pc"
        [editable]="editable"
        (pcChange)="onPcChange($event)">
      </app-ability-scores>
      <app-skills-list    [pc]="pc"></app-skills-list>
    </div>
    <div class="col-right">
      <app-conditions-panel
        [pc]="pc"
        (conditionToggled)="onConditionToggle($event)">
      </app-conditions-panel>
      <!-- Survival is DM-managed: the controls show only on the DM's cross-link view. -->
      <app-survival-panel
        *ngIf="survivalConditions && editable"
        [pc]="pc"
        [editable]="true"
        (pcChange)="onPcChange($event)">
      </app-survival-panel>
      <app-features-list    [pc]="pc" [addAllowed]="editable" (featureGranted)="onFeatureGrant($event)"></app-features-list>
      <app-coin-purse
        [pc]="pc"
        [editable]="editable"
        (pcChange)="onPcChange($event)">
      </app-coin-purse>
      <app-background-story [pc]="pc"></app-background-story>
    </div>
  </div>

  <!-- SPELLS TAB -->
  <div class="sheet-tab-panel" *ngIf="activeTab === 'spells'">
    <app-spellbook-panel
      [pc]="pc"
      [editable]="editable"
      [strictComponents]="strictComponents"
      [castable]="sessionLive"
      [addAllowed]="editable"
      (castRequested)="onCastRequested($event)"
      (pcChange)="onPcChange($event)"
      (spellsGranted)="onSpellsGrant($event)">
    </app-spellbook-panel>
  </div>

  <!-- INVENTORY TAB -->
  <div class="sheet-tab-panel" *ngIf="activeTab === 'inventory'">
    <app-equipment-panel *ngIf="!slotInventory" [pc]="pc"></app-equipment-panel>
    <app-inventory-panel
      [pc]="pc"
      [editable]="showActions || inventoryEditable"
      [addAllowed]="editable"
      [shopOpenForMe]="shopOpenForMe"
      [shopCategory]="shopCategory"
      [slotInventory]="slotInventory"
      (pcChange)="onPcChange($event)"
      (itemGranted)="onItemGrant($event)"
      (sellRequested)="sellRequested.emit($event)">
    </app-inventory-panel>
  </div>

  <!-- NOTES TAB -->
  <div class="sheet-tab-panel" *ngIf="activeTab === 'notes'">
    <app-pc-notes
      [pc]="pc"
      [canWrite]="(showActions || inventoryEditable) && !editable"
      [sessionId]="noteSessionId">
    </app-pc-notes>
  </div>

</div>
