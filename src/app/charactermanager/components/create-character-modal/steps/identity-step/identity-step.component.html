<div class="modal-title">Forge a New Hero</div>
<div class="modal-sub">Every legend begins with a name written in ink, and most end the same way.</div>

<div class="field">
  <label>Hero's Name</label>
  <input [ngModel]="name"
         (ngModelChange)="nameChange.emit($event)"
         placeholder="e.g. Seraphina Goldveil"
         autofocus
         (keydown.enter)="next.emit()"
         (keydown.escape)="cancel.emit()">
</div>

<div class="field">
  <label>Player</label>
  <input [value]="player" disabled
         title="Your characters are listed under your username">
</div>
