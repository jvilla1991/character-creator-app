<div class="modal-title">Choose a Class</div>
<div class="modal-sub">Your class sets your hit points, fighting style, and saving throw proficiencies.</div>

<div *ngIf="loadingClassList" class="loading">Loading classes…</div>
<div *ngIf="!loadingClassList" class="picker-accordion">
  <ng-container *ngFor="let c of classList">
    <button class="class-pick accordion-head"
            [class.active]="clazz === c"
            type="button"
            (click)="toggle.emit(c)">
      <span>{{ c }}</span>
      <svg class="accordion-chev" [class.open]="clazz === c" viewBox="0 0 10 10" aria-hidden="true">
        <path d="M2 4l3 3 3-3"/>
      </svg>
    </button>

    <!-- Selected class: hit die / saves (and subclass if required) below it -->
    <div *ngIf="clazz === c" class="accordion-body">
      <div *ngIf="!classDetail" class="loading">Loading class details…</div>
      <div *ngIf="classDetail" class="detail-card" [class.updating]="loadingClassDetail">
        <div class="detail-row">
          <span class="detail-label">Hit Die</span>
          <span class="detail-value">d{{ classDetail.hit_die }}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Saving Throws</span>
          <span class="detail-value">{{ classSavingThrows }}</span>
        </div>
      </div>

      <!-- Subclass picker — Sorcerer and Warlock choose at level 1 (2024 PHB) -->
      <ng-container *ngIf="requiresLevel1Subclass && classDetail && !loadingClassDetail">
        <div class="subclass-header">
          <span class="eyebrow">Choose a Subclass</span>
          <span class="subclass-note">Required at level 1 for {{ clazz }}</span>
        </div>
        <div class="subclass-list">
          <button *ngFor="let sub of availableSubclasses"
                  type="button"
                  class="subclass-card"
                  [class.active]="selectedSubclass === sub.name"
                  (click)="selectedSubclassChange.emit(sub.name)">
            <span class="subclass-name">{{ sub.name }}</span>
            <span class="subclass-desc">{{ sub.desc }}</span>
          </button>
        </div>
      </ng-container>
    </div>
  </ng-container>
</div>
