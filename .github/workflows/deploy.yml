name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "24"  # Angular 21 requires Node 20.19+ / 22 / 24

jobs:
  build-and-deploy:
    name: Build, upload & invalidate
    runs-on: ubuntu-latest
    # Runs in the "production" GitHub Environment so the OIDC token subject is
    # repo:<org>/<repo>:environment:production — matching the deploy role's trust.
    environment: production

    permissions:
      id-token: write   # required for OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── Build ─────────────────────────────────────────────────────────────────

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Inject the real API URLs into the committed environment.prod.ts.
      # AUTH_SERVICE_URL and CHARACTER_SERVICE_URL come from the Terraform outputs
      # of table-mimic (auth_service_url and character_service_url).
      #
      # IMPORTANT: only fill the two empty URL fields — do NOT rewrite the whole
      # file. The committed environment.prod.ts defines `demoMode` as a runtime
      # getter that reads the visitor's localStorage opt-in; overwriting the file
      # replaced it with a hardcoded `demoMode: false`, which is why the live
      # "Enter in Demo Mode" button never engaged demo mode.
      - name: Inject production API URLs
        env:
          AUTH_URL: ${{ secrets.AUTH_SERVICE_URL }}
          CHARACTER_URL: ${{ secrets.CHARACTER_SERVICE_URL }}
        run: |
          sed -i "s|authApiUrl: ''|authApiUrl: '${AUTH_URL}'|" src/environments/environment.prod.ts
          sed -i "s|characterApiUrl: ''|characterApiUrl: '${CHARACTER_URL}'|" src/environments/environment.prod.ts
          echo "Injected API URLs; demoMode getter preserved:"
          cat src/environments/environment.prod.ts

      - name: Build
        run: npm run build -- --configuration production

      # ── AWS credentials via OIDC ──────────────────────────────────────────────

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Deploy to S3 ──────────────────────────────────────────────────────────
      # Angular uses outputHashing: "all" in production, so JS/CSS/image filenames
      # contain a content hash. Those can be cached indefinitely — only index.html
      # needs a short TTL so deploys are visible quickly.

      - name: Sync dist/ to S3
        run: |
          # Long-cache all hashed assets (Angular adds content hash to filenames)
          aws s3 sync dist/character-creator/browser/ "s3://${{ secrets.S3_BUCKET }}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --region "$AWS_REGION"

          # Short-cache index.html so new deploys are picked up immediately
          aws s3 cp dist/character-creator/browser/index.html \
            "s3://${{ secrets.S3_BUCKET }}/index.html" \
            --cache-control "public, max-age=0, must-revalidate" \
            --region "$AWS_REGION"

      # ── CloudFront invalidation ───────────────────────────────────────────────

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
